<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N Cafe Auto</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app">
    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">N Cafe Auto</div>
      <div class="sidebar-accounts" id="sidebar-accounts"></div>
      <button class="sidebar-add-btn" id="btn-add-tab">+ 계정 추가</button>
    </aside>

    <main class="main-area">
      <!-- 전체 실행 바 -->
      <div class="global-exec-bar" id="global-exec-bar">
        <div class="global-exec-buttons">
          <button class="btn btn-primary btn-global-start" id="btn-global-start">전체 시작</button>
          <button class="btn btn-danger btn-global-stop" id="btn-global-stop" disabled>전체 중지</button>
        </div>
        <div class="global-exec-progress">
          <span class="global-exec-text" id="global-exec-text">대기 중</span>
        </div>
      </div>

      <!-- 서브탭 네비 -->
      <nav class="subtab-nav" id="subtab-nav" style="display:none;">
        <button class="subtab-btn active" data-subtab="settings">설정</button>
        <button class="subtab-btn" data-subtab="manuscripts">원고</button>
        <button class="subtab-btn" data-subtab="execution">실행</button>
      </nav>

      <!-- 탭 콘텐츠 -->
      <div class="tab-content" id="tab-content">
        <div class="empty-state" id="empty-state">
          <p>등록된 계정이 없습니다.</p>
          <p><strong>+ 계정 추가</strong> 버튼을 눌러 계정을 추가하세요.</p>
        </div>
      </div>
    </main>

    <!-- 계정 추가 모달 -->
    <div id="add-account-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <h3>계정 추가</h3>
        <div class="form-group">
          <label>네이버 아이디</label>
          <input type="text" id="modal-account-id" class="input" placeholder="아이디" style="width:100%;">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="modal-account-pw" class="input" placeholder="비밀번호" style="width:100%;">
        </div>
        <div class="form-row" style="margin-top:16px; justify-content:flex-end;">
          <button id="modal-cancel" class="btn btn-secondary">취소</button>
          <button id="modal-confirm" class="btn btn-primary">추가</button>
        </div>
      </div>
    </div>
  </div>

  <script src="components/account-tab.js"></script>
  <script src="app.js"></script>
</body>
</html>
